name: snapprice
description: "Busca productos con una foto, compara precios y encuentra la tienda más cercana."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
  google_mlkit_object_detection: ^0.11.0
  geolocator: ^11.0.0
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  provider: ^6.1.1
  uuid: ^4.3.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
